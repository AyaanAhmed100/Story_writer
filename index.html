<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - AI Story Writer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <main class="app-container">
    <header class="app-header">
      <h1>Lumina</h1>
      <p>AI Story Generator</p>
    </header>

    <section class="story-display" id="storyDisplay">
      <div class="placeholder-text" id="placeholder">
        Your epic narrative will unfold here...
      </div>
    </section>

    <footer class="input-container">
      <div class="prompt-wrapper">
        <textarea 
          id="promptInput" 
          placeholder="Describe the spark of your story (e.g., A clockmaker who discovers a gear that turns back time...)" 
          rows="1"></textarea>
        
        <button id="actionButton" class="send-state" aria-label="Send prompt">
          <span class="icon-vector"></span>
        </button>
      </div>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
