<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Writer</title>
    <!-- Tailwind CSS without build tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        
        /* Seamless Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col selection:bg-indigo-500/30">

    <!-- Top Navigation -->
    <header class="border-b border-zinc-900 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 text-indigo-400 font-semibold tracking-wide">
                <i data-lucide="zap" class="w-5 h-5"></i>
                Spark Writer
            </div>
            <div class="flex items-center gap-3">
                <i data-lucide="key" class="w-4 h-4 text-zinc-500"></i>
                <input 
                    type="password" 
                    id="api-key-input"
                    placeholder="Groq Key (gsk_...)" 
                    class="bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-1.5 text-sm w-48 focus:outline-none focus:border-indigo-500 text-zinc-300 placeholder:text-zinc-600 transition-colors shadow-inner"
                >
            </div>
        </div>
    </header>

    <!-- Canvas Area -->
    <main class="flex-1 w-full pb-36 pt-8" id="story-container">
        <!-- Empty State -->
        <div id="welcome-screen" class="max-w-4xl mx-auto px-4 text-center mt-20 text-zinc-500 transition-opacity">
            <i data-lucide="book-open" class="w-12 h-12 mx-auto mb-4 text-zinc-700"></i>
            <h2 class="text-xl font-medium text-zinc-300 mb-2">Initialize Narrative Engine</h2>
            <p class="text-sm">Provide a concept, character, or setting below.<br>The system will stream the generated output in real-time.</p>
        </div>
    </main>

    <!-- Fixed Input Controller -->
    <div class="fixed bottom-0 w-full bg-gradient-to-t from-[#09090b] via-[#09090b] to-transparent pt-10 pb-6 px-4">
        <div class="max-w-4xl mx-auto relative flex items-end gap-3 bg-zinc-900/60 backdrop-blur-xl border border-zinc-800 rounded-2xl p-2.5 shadow-2xl focus-within:border-indigo-500/50 transition-all">
            
            <textarea 
                id="prompt-input" 
                rows="1"
                placeholder="Write a story about a cybernetic detective in neon Tokyo..."
                class="w-full bg-transparent text-zinc-100 py-3 pl-4 pr-2 focus:outline-none resize-none max-h-48 text-[15px]"
            ></textarea>

            <button 
                id="action-btn" 
                class="flex-shrink-0 h-[3.25rem] w-[3.25rem] rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white flex items-center justify-center transition-colors duration-200 shadow-lg mb-0.5"
            >
                <!-- Send Icon -->
                <i data-lucide="arrow-up" id="send-icon" class="w-6 h-6"></i>
                <!-- Square Stop Icon -->
                <i data-lucide="square" id="stop-icon" class="w-5 h-5 hidden" fill="currentColor"></i>
            </button>
        </div>
        <p class="text-center text-xs text-zinc-600 mt-3 font-medium">Qwen 3.6 27B via Groq API • Press Shift + Enter for new line</p>
    </div>

    <!-- Application Module Injection -->
    <script type="module" src="./app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
